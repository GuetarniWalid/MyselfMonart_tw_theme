name: Sync Shopify Theme to GitHub

on:
  workflow_dispatch:
    inputs:
      source_theme:
        description: "Shopify theme to pull from"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - live
      base_branch:
        description: "Branch that will receive the sync PR"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - main

permissions:
  contents: write
  pull-requests: write

env:
  THEME_DIRS: "assets config layout locales sections snippets templates"

jobs:
  sync:
    name: Pull Shopify theme and open PR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout base branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.base_branch }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Shopify CLI
        run: npm install -g @shopify/cli@latest

      - name: Resolve source theme
        id: source
        shell: bash
        run: |
          if [[ "${{ github.event.inputs.source_theme }}" == "live" ]]; then
            echo "theme_id=${{ secrets.SHOPIFY_LIVE_THEME_ID }}" >> "$GITHUB_OUTPUT"
          else
            echo "theme_id=${{ secrets.SHOPIFY_STAGING_THEME_ID }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Pull theme from Shopify
        env:
          SHOPIFY_CLI_THEME_TOKEN: ${{ secrets.SHOPIFY_CLI_THEME_TOKEN }}
          SHOPIFY_FLAG_STORE: ${{ secrets.SHOPIFY_STORE }}
        run: |
          shopify theme pull \
            --theme "${{ steps.source.outputs.theme_id }}" \
            --path . \
            --nodelete

      - name: Create pull request with Shopify admin changes
        uses: peter-evans/create-pull-request@v6
        with:
          branch: sync/shopify-${{ github.event.inputs.source_theme }}-${{ github.run_id }}
          base: ${{ github.event.inputs.base_branch }}
          title: "sync(shopify): pull ${{ github.event.inputs.source_theme }} theme changes"
          commit-message: "sync(shopify): pull ${{ github.event.inputs.source_theme }} theme changes"
          body: |
            This PR was generated by the Shopify theme sync workflow.

            Source Shopify theme: `${{ github.event.inputs.source_theme }}`
            Base branch: `${{ github.event.inputs.base_branch }}`

            Review carefully before merging. It may include changes made from the Shopify admin/theme editor.
          labels: shopify-sync
          add-paths: |
            assets
            config
            layout
            locales
            sections
            snippets
            templates
