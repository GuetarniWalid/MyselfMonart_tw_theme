name: Deploy Shopify Theme

on:
  push:
    branches:
      - staging
      - main
  workflow_dispatch:
    inputs:
      target:
        description: "Theme target to deploy"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - live

concurrency:
  group: shopify-theme-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy theme
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Tailwind CSS
        run: npx tailwindcss -i ./input.css -o ./assets/output.css --minify

      - name: Install Shopify CLI
        run: npm install -g @shopify/cli@latest

      - name: Resolve target theme
        id: target
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TARGET="${{ github.event.inputs.target }}"
          elif [[ "${{ github.ref_name }}" == "main" ]]; then
            TARGET="live"
          else
            TARGET="staging"
          fi

          if [[ "$TARGET" == "live" ]]; then
            echo "theme_id=${{ secrets.SHOPIFY_LIVE_THEME_ID }}" >> "$GITHUB_OUTPUT"
            echo "allow_live=--allow-live" >> "$GITHUB_OUTPUT"
          else
            echo "theme_id=${{ secrets.SHOPIFY_STAGING_THEME_ID }}" >> "$GITHUB_OUTPUT"
            echo "allow_live=" >> "$GITHUB_OUTPUT"
          fi

          echo "target=$TARGET" >> "$GITHUB_OUTPUT"

      - name: Deploy to Shopify ${{ steps.target.outputs.target }} theme
        env:
          SHOPIFY_CLI_THEME_TOKEN: ${{ secrets.SHOPIFY_CLI_THEME_TOKEN }}
          SHOPIFY_FLAG_STORE: ${{ secrets.SHOPIFY_STORE }}
        run: >-
          shopify theme push
          --theme "${{ steps.target.outputs.theme_id }}"
          --path .
          --json
          ${{ steps.target.outputs.allow_live }}
