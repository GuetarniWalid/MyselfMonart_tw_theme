name: Deploy Shopify Theme

on:
  push:
    branches:
      - staging
      - main
  workflow_dispatch:
    inputs:
      target:
        description: "Theme target to deploy"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - live

permissions:
  contents: write

env:
  THEME_DIRS: "assets config layout locales sections snippets templates"
  DEPLOY_MARKER: "assets/github-deploy-info.json"

concurrency:
  group: shopify-theme-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Sync Shopify admin changes, then deploy theme
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ github.token }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Tailwind CSS
        run: npx tailwindcss -i ./input.css -o ./assets/output.css --minify

      - name: Install Shopify CLI
        run: npm install -g @shopify/cli@latest

      - name: Resolve target theme
        id: target
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TARGET="${{ github.event.inputs.target }}"
          elif [[ "${{ github.ref_name }}" == "main" ]]; then
            TARGET="live"
          else
            TARGET="staging"
          fi

          if [[ "$TARGET" == "live" ]]; then
            echo "theme_id=${{ secrets.SHOPIFY_LIVE_THEME_ID }}" >> "$GITHUB_OUTPUT"
            echo "allow_live=--allow-live" >> "$GITHUB_OUTPUT"
          else
            echo "theme_id=${{ secrets.SHOPIFY_STAGING_THEME_ID }}" >> "$GITHUB_OUTPUT"
            echo "allow_live=" >> "$GITHUB_OUTPUT"
          fi

          echo "target=$TARGET" >> "$GITHUB_OUTPUT"

      - name: Pull current Shopify theme before deploying
        env:
          SHOPIFY_CLI_THEME_TOKEN: ${{ secrets.SHOPIFY_CLI_THEME_TOKEN }}
          SHOPIFY_FLAG_STORE: ${{ secrets.SHOPIFY_STORE }}
        run: |
          set -euo pipefail
          mkdir -p /tmp/shopify-remote-theme
          shopify theme pull \
            --theme "${{ steps.target.outputs.theme_id }}" \
            --path /tmp/shopify-remote-theme \
            --nodelete

      - name: Auto-sync Shopify admin changes into GitHub before deploy
        id: autosync
        shell: bash
        run: |
          set -euo pipefail

          MARKER="/tmp/shopify-remote-theme/${DEPLOY_MARKER}"

          if [[ ! -f "$MARKER" ]]; then
            echo "::warning::No previous deployment marker found on the ${{ steps.target.outputs.target }} theme."
            echo "::warning::Skipping auto-sync protection for this first protected deployment only."
            echo "::warning::After this run, the theme will contain ${DEPLOY_MARKER} and future runs will be protected."
            echo "synced=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          LAST_SHA="$(python3 -c "import json; from pathlib import Path; print(json.loads(Path('/tmp/shopify-remote-theme/assets/github-deploy-info.json').read_text()).get('sha', ''))")"

          if [[ -z "$LAST_SHA" ]]; then
            echo "::error::Deployment marker exists but does not contain a sha. Cannot safely auto-sync."
            exit 1
          fi

          if ! git cat-file -e "$LAST_SHA^{commit}"; then
            echo "::error::Last deployed commit $LAST_SHA is not available in this repository checkout. Cannot safely auto-sync."
            exit 1
          fi

          mkdir -p /tmp/last-deployed-theme
          git archive "$LAST_SHA" $THEME_DIRS | tar -x -C /tmp/last-deployed-theme

          # The deploy marker is generated by CI, not committed. Ignore it for drift comparison.
          rm -f "/tmp/shopify-remote-theme/${DEPLOY_MARKER}"

          REMOTE_CHANGED="/tmp/shopify-remote-changed.txt"
          LOCAL_CHANGED="/tmp/github-local-changed.txt"
          TO_SYNC="/tmp/shopify-sync-files.txt"
          CONFLICTS="/tmp/shopify-sync-conflicts.txt"
          : > "$REMOTE_CHANGED"
          : > "$LOCAL_CHANGED"
          : > "$TO_SYNC"
          : > "$CONFLICTS"

          for dir in $THEME_DIRS; do
            mkdir -p "/tmp/last-deployed-theme/$dir" "/tmp/shopify-remote-theme/$dir"
            diff -qr "/tmp/last-deployed-theme/$dir" "/tmp/shopify-remote-theme/$dir" \
              | sed -E 's#^Files /tmp/last-deployed-theme/([^ ]+) and /tmp/shopify-remote-theme/\1 differ$#\1#; s#^Only in /tmp/shopify-remote-theme/([^:]+): (.*)$#\1/\2#; s#^Only in /tmp/last-deployed-theme/([^:]+): (.*)$#\1/\2#' \
              | grep -v '^Files ' \
              | sort -u >> "$REMOTE_CHANGED" || true
          done

          git diff --name-only "$LAST_SHA" -- $THEME_DIRS | sort -u > "$LOCAL_CHANGED"
          sort -u "$REMOTE_CHANGED" -o "$REMOTE_CHANGED"

          if [[ ! -s "$REMOTE_CHANGED" ]]; then
            echo "No Shopify admin changes detected. Safe to deploy."
            echo "synced=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Shopify admin changes detected before deploy:"
          sed -n '1,200p' "$REMOTE_CHANGED"

          # Classify each Shopify-side changed file:
          # - if the current GitHub checkout already matches Shopify, it was already synced;
          # - if GitHub also changed the file differently since the last deploy, stop;
          # - otherwise import the Shopify-side change and commit it before deploying.
          while IFS= read -r file; do
            [[ -z "$file" ]] && continue

            REMOTE_FILE="/tmp/shopify-remote-theme/$file"

            if [[ -f "$REMOTE_FILE" && -f "$file" ]] && cmp -s "$REMOTE_FILE" "$file"; then
              continue
            fi

            if [[ ! -f "$REMOTE_FILE" && ! -e "$file" ]]; then
              continue
            fi

            if grep -Fxq "$file" "$LOCAL_CHANGED"; then
              echo "$file" >> "$CONFLICTS"
            else
              echo "$file" >> "$TO_SYNC"
            fi
          done < "$REMOTE_CHANGED"

          sort -u "$TO_SYNC" -o "$TO_SYNC"
          sort -u "$CONFLICTS" -o "$CONFLICTS"

          if [[ -s "$CONFLICTS" ]]; then
            # Homepage redesign files are intentionally GitHub-authoritative.
            # The staging preview must reflect the committed homepage structure,
            # even if Shopify Admin still has older copies of these files.
            GIT_AUTHORITATIVE_CONFLICTS="/tmp/shopify-git-authoritative-conflicts.txt"
            REMAINING_CONFLICTS="/tmp/shopify-remaining-conflicts.txt"
            : > "$GIT_AUTHORITATIVE_CONFLICTS"
            : > "$REMAINING_CONFLICTS"

            while IFS= read -r file; do
              case "$file" in
                templates/index.json|\
                snippets/head-base.liquid|\
                layout/theme.liquid|\
                sections/collections-pages-grid.liquid|\
                assets/homepage-artesta-inspired.css|\
                assets/output.css)
                  echo "$file" >> "$GIT_AUTHORITATIVE_CONFLICTS"
                  ;;
                *)
                  echo "$file" >> "$REMAINING_CONFLICTS"
                  ;;
              esac
            done < "$CONFLICTS"

            if [[ -s "$GIT_AUTHORITATIVE_CONFLICTS" ]]; then
              echo "::warning::Using GitHub as source of truth for approved homepage redesign file(s):"
              sed -n '1,200p' "$GIT_AUTHORITATIVE_CONFLICTS"
            fi

            if [[ -s "$REMAINING_CONFLICTS" ]]; then
              echo "::error::Both GitHub and Shopify changed the same theme file(s) differently since the last deploy."
              echo "::error::Auto-sync would risk overwriting work. Resolve these files manually, then push again."
              sed -n '1,200p' "$REMAINING_CONFLICTS"
              exit 1
            fi
          fi

          if [[ ! -s "$TO_SYNC" ]]; then
            echo "Shopify admin changes are already present in this GitHub commit. Safe to deploy."
            echo "synced=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "No same-file conflict detected. Auto-syncing Shopify admin changes into ${{ github.ref_name }}:"
          sed -n '1,200p' "$TO_SYNC"

          while IFS= read -r file; do
            [[ -z "$file" ]] && continue
            if [[ -f "/tmp/shopify-remote-theme/$file" ]]; then
              mkdir -p "$(dirname "$file")"
              cp "/tmp/shopify-remote-theme/$file" "$file"
              git add "$file"
            else
              git rm -f --ignore-unmatch "$file"
            fi
          done < "$TO_SYNC"

          if git diff --cached --quiet; then
            echo "No syncable changes after staging. Safe to deploy."
            echo "synced=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "sync(shopify): import ${{ steps.target.outputs.target }} theme admin changes"
          git push origin "HEAD:${{ github.ref_name }}"

          echo "::notice::Shopify admin changes were committed to ${{ github.ref_name }}."
          echo "::notice::Continuing this same run to deploy the merged GitHub + Shopify state."
          echo "synced=true" >> "$GITHUB_OUTPUT"

      - name: Rebuild Tailwind CSS after auto-sync
        if: steps.autosync.outputs.synced == 'true'
        run: npx tailwindcss -i ./input.css -o ./assets/output.css --minify

      - name: Write deployment marker
        shell: bash
        run: |
          python3 - <<'PY'
          import json, os, subprocess
          from datetime import datetime, timezone
          deployed_sha = subprocess.check_output(["git", "rev-parse", "HEAD"], text=True).strip()
          info = {
            "sha": deployed_sha,
            "branch": os.environ["GITHUB_REF_NAME"],
            "run_id": os.environ["GITHUB_RUN_ID"],
            "run_url": f"https://github.com/{os.environ['GITHUB_REPOSITORY']}/actions/runs/{os.environ['GITHUB_RUN_ID']}",
            "deployed_at": datetime.now(timezone.utc).isoformat(),
          }
          os.makedirs("assets", exist_ok=True)
          with open("assets/github-deploy-info.json", "w") as f:
              json.dump(info, f, indent=2)
              f.write("\n")
          PY

      - name: Deploy to Shopify ${{ steps.target.outputs.target }} theme
        env:
          SHOPIFY_CLI_THEME_TOKEN: ${{ secrets.SHOPIFY_CLI_THEME_TOKEN }}
          SHOPIFY_FLAG_STORE: ${{ secrets.SHOPIFY_STORE }}
        run: >-
          shopify theme push
          --theme "${{ steps.target.outputs.theme_id }}"
          --path .
          --json
          --nodelete
          ${{ steps.target.outputs.allow_live }}
